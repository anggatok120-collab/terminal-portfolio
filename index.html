<style>
  :root{
    --bg:#0a0a0d;
    --window:#15151c;
    --header:#111116;
    --border:rgba(163,230,53,0.18);
    --text:#f0f0f5;
    --muted:#78788a;
    --accent:#a3e635;
    --accent-soft:rgba(163,230,53,0.08);
    --accent-border:rgba(163,230,53,0.22);
    --path:#818cf8;
    --font:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;min-height:100%;
    background:radial-gradient(circle at 50% 0%, #15151c 0%, #0a0a0d 60%);
    color:var(--text);
    font-family:var(--font);
  }
  body{display:flex;justify-content:center;padding:28px 16px 20px;}
  .wrap{width:100%;max-width:740px;display:flex;flex-direction:column;gap:14px;}
  .terminal{
    background:var(--window);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 30px 70px -25px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.02);
    display:flex;flex-direction:column;
    height:min(70vh,560px);
  }
  .titlebar{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px;
    background:var(--header);
    border-bottom:1px solid var(--border);
    font-size:12px;color:var(--muted);
  }
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block;}
  .dot.red{background:#ff5f56;}
  .dot.yellow{background:#ffbd2e;}
  .dot.green{background:#27c93f;}
  .titlebar .title{margin-left:6px;}
  .lang-toggle{margin-left:auto;display:flex;gap:4px;}
  .lang-btn{
    background:transparent;color:var(--muted);
    border:1px solid var(--border);border-radius:4px;
    padding:2px 7px;font-family:var(--font);font-size:11px;
    cursor:pointer;transition:all .15s ease;
  }
  .lang-btn.active{
    background:var(--accent-soft);color:var(--accent);
    border-color:var(--accent-border);
  }
  .lang-btn:hover:not(.active){color:var(--text);border-color:var(--muted);}
  .welcome{padding:16px 18px 0;font-size:13.5px;line-height:1.6;border-bottom:1px solid var(--border);}
  .output{flex:1;overflow-y:auto;padding:16px 18px;font-size:13.5px;line-height:1.6;}
  .output::-webkit-scrollbar{width:8px;}
  .output::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .output::-webkit-scrollbar-track{background:transparent;}
  .output pre{margin:4px 0 16px;white-space:pre-wrap;overflow-wrap:break-word;font-family:var(--font);}
  .echo{color:var(--muted);margin-top:16px;}
  .echo:first-child{margin-top:0;}
  .muted{color:var(--muted);}
  .p-user,.p-host{color:var(--accent);}
  .p-path{color:var(--path);}
  .p-at,.p-colon{color:var(--muted);}
  .p-dollar{color:var(--muted);margin-right:7px;}
  .input-line{
    display:flex;align-items:center;gap:8px;
    padding:11px 14px;border-top:1px solid var(--border);
    background:var(--header);
  }
  .prompt{white-space:nowrap;font-size:13.5px;}
  #cmd-input{
    flex:1;background:transparent;border:none;
    color:var(--text);font-family:var(--font);font-size:13.5px;
    caret-color:transparent;
  }
  #fake-cursor{
    position:absolute;width:0.58em;height:1.15em;
    background:var(--accent);opacity:0.9;
    animation:tblink 1.1s step-end infinite;
    pointer-events:none;display:none;
    top:50%;transform:translateY(-50%);
  }
  @keyframes tblink{50%{opacity:0;}}
  #cmd-input:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    background:var(--accent-soft);color:var(--accent);
    border:1px solid var(--accent-border);border-radius:999px;
    padding:7px 14px;font-family:var(--font);font-size:12.5px;
    cursor:pointer;transition:background .15s ease;
  }
  .chip:hover{background:rgba(94,234,212,.2);}
  .chip:active{background:rgba(94,234,212,.3);}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .link{color:var(--accent);text-decoration:none;}
  .link:hover{text-decoration:underline;}
  .exp-wrap{margin:4px 0 16px;font-family:var(--font);font-size:inherit;}
  .exp-section{margin-bottom:18px;}
  .exp-role{color:var(--text);}
  .exp-period{color:var(--muted);margin-bottom:6px;}
  .exp-list{list-style:none;padding:0;margin:0;}
  .exp-list li{padding-left:1.8em;text-indent:-1.8em;line-height:1.6;}
  .exp-list li::before{content:'> ';color:var(--muted);}
  .exp-status{color:var(--muted);margin-top:8px;}
  @media (prefers-reduced-motion: reduce){
    .chip,.lang-btn{transition:none;}
  }
  #send-btn{
    display:none;
    background:var(--accent-soft);color:var(--accent);
    border:1px solid var(--accent-border);border-radius:6px;
    padding:4px 10px;font-family:var(--font);font-size:12px;
    cursor:pointer;white-space:nowrap;
  }
  #send-btn:active{background:rgba(94,234,212,.3);}
  @media (max-width:480px){
    body{padding:12px 10px 16px;}
    .terminal{height:min(58vh,500px);}
    .output{font-size:11.5px;padding:12px 14px;line-height:1.7;}
    .welcome{font-size:11.5px;padding:12px 14px 0;line-height:1.7;}
    #send-btn{display:inline-block;padding:4px 8px;font-size:11px;}
    .p-user,.p-at,.p-host,.p-colon{display:none;}
    .input-line{padding:9px 12px;gap:6px;}
    #cmd-input{font-size:13px;}
    .titlebar{padding:8px 12px;font-size:11px;}
    .lang-btn{padding:2px 5px;font-size:10px;}
    .chips{gap:6px;}
    .chip{padding:6px 12px;font-size:12px;}
  }
</style>
</head>

<script>
  const output = document.getElementById('output');

  let lang = localStorage.getItem('lang') || 'id';

  function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function printLine(html){
    const div = document.createElement('div');
    div.innerHTML = html;
    output.appendChild(div);
  }
  function renderBlock(target, text){
    const container = document.createElement('div');
    container.style.cssText = 'margin:4px 0 16px;font-family:var(--font);font-size:inherit;line-height:1.6;white-space:pre-wrap;';
    text.split('\n').forEach(function(line){
      const d = document.createElement('div');
      const bullet = line.match(/^(\s*)(>\s)(.*)/);
      const indent = !bullet && line.match(/^(\s{2,})(.*)/);
      if(bullet){
        const pad = (bullet[1].length * 0.55) + 1.6;
        d.style.cssText = 'padding-left:' + pad + 'em;';
        d.innerHTML = '<span style="display:inline-block;width:1.6em;margin-left:-1.6em;color:var(--muted);">&gt; </span>' + escapeHtml(bullet[3]);
      } else if(indent){
        const pad = indent[1].length * 0.55;
        d.style.cssText = 'padding-left:' + pad + 'em;';
        d.textContent = indent[2];
      } else if(line === ''){
        d.style.height = '0.7em';
      } else {
        d.textContent = line;
      }
      container.appendChild(d);
    });
    target.appendChild(container);
  }
  function printBlock(text){
    renderBlock(output, text);
  }
  function promptHtml(){
    return '<span class="p-user">guest</span><span class="p-at">@</span><span class="p-host">angga</span><span class="p-colon">:</span><span class="p-path">~</span><span class="p-dollar">$</span>';
  }
  function printCommandEcho(raw){
    printLine('<div class="echo">' + promptHtml() + ' ' + escapeHtml(raw) + '</div>');
  }

    output.scrollTop = output.scrollHeight;
  }

  function handleProjects(){
    const pre = document.createElement('pre');
    if(lang === 'id'){

        '    Website portofolio pribadi berbasis Next.js.\n' +
        '    <a href="https://anggatok.my.id" class="link" target="_blank" rel="noopener">anggatok.my.id</a>\n' +
        '    <a href="https://github.com/anggatok120-collab/porto-next" class="link" target="_blank" rel="noopener">github.com/anggatok120-collab/porto-next</a>\n\n' +
        '02. Terminal Portfolio — ini\n' +
        '    Portofolio interaktif berbasis terminal, vanilla HTML/CSS/JS.\n' +
        '    <a href="https://portfolio.anggatok.my.id" class="link" target="_blank" rel="noopener">portfolio.anggatok.my.id</a>\n' +
        '    <a href="https://github.com/anggatok120-collab/terminal-portfolio" class="link" target="_blank" rel="noopener">github.com/anggatok120-collab/terminal-portfolio</a>';
    } else {
      pre.innerHTML =
        '01. Porto Next — Portfolio Website\n' +
        '    Personal portfolio website built with Next.js.\n' +
        '    <a href="https://anggatok.my.id" class="link" target="_blank" rel="noopener">anggatok.my.id</a>\n' +
        '    <a href="https://github.com/anggatok120-collab/porto-next" class="link" target="_blank" rel="noopener">github.com/anggatok120-collab/porto-next</a>\n\n' +
        '02. Terminal Portfolio — this one\n' +
        '    Interactive terminal-style portfolio, vanilla HTML/CSS/JS.\n' +
        '    <a href="https://portfolio.anggatok.my.id" class="link" target="_blank" rel="noopener">portfolio.anggatok.my.id</a>\n' +
        '    <a href="https://github.com/anggatok120-collab/terminal-portfolio" class="link" target="_blank" rel="noopener">github.com/anggatok120-collab/terminal-portfolio</a>';
    }
    output.appendChild(pre);
    scrollToBottom();
  }

  function handleContact(){
    const loc = lang === 'id' ? 'Lokasi   ' : 'Location ';
    const locVal = lang === 'id' ? 'Malang, Jawa Timur, Indonesia' : 'Malang, East Java, Indonesia';
    const pre = document.createElement('pre');
    pre.innerHTML =
      'Email     <a href="mailto:anggatok120@gmail.com" class="link" target="_blank" rel="noopener">anggatok120@gmail.com</a>\n' +
      'LinkedIn  <a href="https://www.linkedin.com/in/angga-angga-1147b1369" class="link" target="_blank" rel="noopener">linkedin.com/in/angga-angga-1147b1369</a>\n' +
      'GitHub    <a href="https://github.com/anggatok120-collab" class="link" target="_blank" rel="noopener">github.com/anggatok120-collab</a>\n' +
      'Website   <a href="https://portfolio.anggatok.my.id" class="link" target="_blank" rel="noopener">portfolio.anggatok.my.id</a>\n' +
      'Website   <a href="https://anggatok.my.id" class="link" target="_blank" rel="noopener">anggatok.my.id</a>\n' +
      loc + ' ' + locVal;
    output.appendChild(pre);
    scrollToBottom();
  }

  function runCommand(raw){
    const cmd = raw.trim().toLowerCase();
    if(!cmd) return;
    printCommandEcho(raw);
    if(cmd === 'clear'){
      output.innerHTML = '';
      return;
    }
    if(cmd === 'resume'){ handleResume(); return; }
    if(cmd === 'contact'){ handleContact(); return; }
    if(cmd === 'projects'){ handleProjects(); return; }
    if(cmd === 'whoami'){ handleWhoami(); return; }
    if(cmd === 'education'){ handleEducation(); return; }
    if(cmd === 'experience'){ handleExperience(); return; }
    if(cmd === 'skills'){ handleSkills(); return; }
    if(cmd === 'date'){
      printBlock(new Date().toString());
      scrollToBottom();
      return;
    }
    if(D()[cmd]){
      printBlock(D()[cmd]);
    } else {
      const msg = lang === 'id'
        ? 'perintah tidak ditemukan: ' + cmd + '\nKetik \'help\' untuk melihat perintah tersedia.'
        : 'command not found: ' + cmd + '\nType \'help\' to see available commands.';
      printBlock(msg);
    }
    scrollToBottom();
  }

  // Language toggle
  const btnID = document.getElementById('btn-id');
  const btnEN = document.getElementById('btn-en');

  function setLang(l, silent){
    lang = l;
    localStorage.setItem('lang', l);
    document.documentElement.lang = l;
    btnID.classList.toggle('active', l === 'id');
    btnEN.classList.toggle('active', l === 'en');
    if(!silent){
      const msg = l === 'id'
        ? '-- Bahasa diubah ke Indonesia --'
        : '-- Language switched to English --';
      printLine('<span class="muted">' + msg + '</span>');
      scrollToBottom();
    }
    input.focus();
  }

  btnID.addEventListener('click', function(){ if(lang !== 'id') setLang('id'); });
  btnEN.addEventListener('click', function(){ if(lang !== 'en') setLang('en'); });
  setLang(lang, true);

  // History
  let history = [];
  let historyIndex = -1;

  const allCommands = ['whoami','skills','experience','education','projects','contact','resume','ls','date','netstat','traceroute','clear','help'];

  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      const val = input.value;
      if(val.trim()){ history.push(val); historyIndex = history.length; }
      runCommand(val);
      input.value = '';
    } else if(e.key === 'Tab'){
      e.preventDefault();
      const typed = input.value.trim().toLowerCase();
      if(!typed) return;
      const match = allCommands.find(function(c){ return c.startsWith(typed); });
      if(match) input.value = match;
    } else if(e.key === 'l' && e.ctrlKey){
      e.preventDefault();
      output.innerHTML = '';
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(historyIndex > 0){ historyIndex--; input.value = history[historyIndex]; }
    } else if(e.key === 'ArrowDown'){
      e.preventDefault();
      if(historyIndex < history.length - 1){ historyIndex++; input.value = history[historyIndex]; }
      else { historyIndex = history.length; input.value = ''; }
    }
  });

  // Chips
  const chipCommands = ['whoami','skills','experience','education','projects','contact','resume','ls','date','clear','help'];
  const chipsContainer = document.getElementById('chips');
  chipCommands.forEach(function(c){
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = c;
    btn.addEventListener('click', function(){ runCommand(c); input.focus(); });
    chipsContainer.appendChild(btn);
  });

  document.getElementById('send-btn').addEventListener('click', function(){
    const val = input.value;
    if(val.trim()){ history.push(val); historyIndex = history.length; }
    runCommand(val);
    input.value = '';
    input.focus();
  });

  terminal.addEventListener('click', function(e){
    if(e.target.id !== 'cmd-input') input.focus();
  });

  // Block cursor
  (function(){
    const cur = document.createElement('span');
    cur.id = 'fake-cursor';
    const inputLine = document.querySelector('.input-line');
    inputLine.style.position = 'relative';
    inputLine.appendChild(cur);
    const cvs = document.createElement('canvas');
    function textW(str){
      const ctx = cvs.getContext('2d');
      const s = getComputedStyle(input);
      ctx.font = s.fontWeight + ' ' + s.fontSize + ' ' + s.fontFamily;
      return ctx.measureText(str).width;
    }
    function moveCursor(){
      cur.style.left = (input.offsetLeft + textW(input.value.substring(0, input.selectionStart))) + 'px';
    }
    input.addEventListener('input', moveCursor);
    input.addEventListener('keydown', function(){ setTimeout(moveCursor, 0); });
    input.addEventListener('click', moveCursor);
    input.addEventListener('focus', function(){ moveCursor(); cur.style.display = 'block'; });
    input.addEventListener('blur', function(){ cur.style.display = 'none'; });
  })();

  const welcome = lang === 'id'
    ? "Login terakhir: " + new Date().toDateString() + "\nSelamat datang — ketik 'help' atau tap perintah di bawah."
    : "Last login: " + new Date().toDateString() + "\nWelcome — type 'help' or tap a command below.";
  renderBlock(document.getElementById('welcome'), welcome);
  input.focus();
</script>
